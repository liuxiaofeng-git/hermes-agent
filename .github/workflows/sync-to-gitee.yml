name: Sync to Gitee

on:
  push:
    branches:
      - main  # 1. 只监听 main 分支的推送

jobs:
  sync-to-gitee:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"

      - name: Push to Gitee
        run: |
          # 2. 关键修改：推送时指定分支映射
          # 将 GitHub 的 main 分支 推送到 Gitee 的 master 分支
          git push --force https://${{ secrets.GITEE_USER }}:${{ secrets.GITEE_TOKEN }}@gitee.com/liuxiaofeng-gitee/hermes-agent.git main:main
