name: Sync to Gitee

on:
  push:
    branches:
      - main
      - master
      - '**'

jobs:
  sync-to-gitee:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # 必须获取所有历史，否则无法镜像

      - name: Sync to Gitee
        run: |
          # 1. 设置 Git 全局配置
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"

          # 2. 使用更安全的方式处理远程地址
          # 注意：这里我们直接使用变量替换，避免特殊字符导致的解析错误
          REMOTE_REPO="https://${{ secrets.GITEE_USER }}:${{ secrets.GITEE_TOKEN }}@gitee.com/${{ secrets.GITEE_USER }}/hermes-agent.git"
          
          # 3. 打印调试信息（可选，不打印敏感信息）
          echo "Pushing to Gitee..."

          # 4. 执行推送
          # 先添加远程地址
          git remote add gitee $REMOTE_REPO
          
          # 强制推送所有分支和标签
          git push --force --mirror gitee
