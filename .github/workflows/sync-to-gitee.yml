name: Sync to Gitee

# 1. 触发条件：当你的 GitHub 仓库收到推送代码时触发
on:
  push:
    branches:
      - main
      - master
      - '**'  # 监听所有分支的推送，确保多分支也能同步

# 2. 定义任务
jobs:
  sync-to-gitee:
    runs-on: ubuntu-latest
    
    steps:
      # 步骤 A: 检出代码
      # 获取完整的 Git 历史，这对于同步至关重要
      - name: Checkout source code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # 获取所有历史记录和标签

      # 步骤 B: 配置 Git 用户信息
      # 这一步是为了让 Git 允许执行推送操作
      - name: Configure Git User
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"

      # 步骤 C: 执行镜像同步
      # 使用 --mirror 参数，它会推送所有分支、标签和引用，完全复刻 GitHub 仓库
      - name: Push to Gitee
        run: |
          # 构建 Gitee 的远程仓库地址
          # 格式：https://用户名:私人令牌@gitee.com/用户名/仓库名.git
          git remote add gitee https://${{ secrets.GITEE_USER }}:${{ secrets.GITEE_TOKEN }}@gitee.com/${{ secrets.GITEE_USER }}/${{ github.event.repository.name }}.git
          
          # 执行强制推送（镜像模式）
          # --mirror 等同于 --all --tags，确保所有分支和标签都同步
          git push --force --mirror gitee